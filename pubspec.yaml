name: invitacion_boda
description: Proyecto de invitación de boda - Flutter Web (ejemplo)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=2.18.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.0
  carousel_slider: ^5.0.0
  google_fonts: ^4.0.3
  audioplayers: ^5.2.1
  card_swiper: ^3.0.1
  infinite_carousel: ^1.1.1
  smooth_page_indicator: ^1.2.1
  universal_html: ^2.2.4
  video_player: ^2.9.1
  pdf: ^3.10.7
  path_provider: ^2.1.3
  js_interop: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - lib/assets/fondo1.jpg
    - lib/assets/sobre1.jpg
    - lib/assets/sobre2.jpg
    - lib/assets/sobre3.jpg
    - lib/assets/sobre4.jpg
    - lib/assets/qrphotos.jpeg
    - lib/assets/1.jpeg
    - lib/assets/2.jpeg
    - lib/assets/3.jpeg
    - lib/assets/4.jpeg
    - lib/assets/5.jpeg
    - lib/assets/6.jpeg
    - lib/assets/hombres.png
    - lib/assets/mujeres.png
    - lib/assets/iglesia.png
    - lib/assets/noniños.gif
    - lib/assets/audio/Fonseca.mp3
    - lib/assets/video/invitacion.mp4
